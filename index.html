<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DTZ Redemittel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{--bg:#f0f3ff;--card:#fff;--primary:#3b6ff7;--text:#1a2140;--muted:#6b7299}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);min-height:100vh;padding-bottom:40px}
.hdr{background:var(--primary);color:#fff;padding:16px 16px 12px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(59,111,247,.35)}
.hdr h1{font-size:18px;font-weight:900;margin-bottom:2px}
.hdr p{font-size:12px;opacity:.75}
.back{display:none;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;padding:5px 12px;border-radius:20px;margin-bottom:8px}
.back.on{display:inline-flex}
.gs,.ds{display:none}
.gs.on,.ds.on{display:block}
.slbl{padding:16px 16px 8px;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px}
.cc{background:var(--card);border-radius:18px;padding:18px 12px 16px;text-align:center;cursor:pointer;box-shadow:0 2px 12px rgba(59,111,247,.1);transition:transform .12s;user-select:none}
.cc:active{transform:scale(.95)}
.cem{font-size:32px;margin-bottom:8px;display:block;line-height:1}
.cnm{font-size:12px;font-weight:900;color:var(--text);line-height:1.3;min-height:30px;display:flex;align-items:center;justify-content:center}
.cct{margin-top:8px;display:inline-block;color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.dhdr{padding:14px 16px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e8ecf8;margin-bottom:4px}
.dem{font-size:28px;flex-shrink:0}
.dtl{font-size:16px;font-weight:900;line-height:1.2}
.dsu{font-size:12px;color:var(--muted);margin-top:2px}
.plist{padding:10px 16px 0;display:flex;flex-direction:column;gap:10px}
.pc{background:var(--card);border-radius:14px;padding:14px 48px 14px 16px;box-shadow:0 2px 12px rgba(59,111,247,.1);border-left:4px solid var(--primary);cursor:pointer;transition:transform .12s,background .12s;position:relative}
.pc:active{transform:scale(.98);background:#eef2ff}
.pt{font-size:14px;font-weight:800;color:var(--text);margin-bottom:5px;line-height:1.4}
.pe{font-size:12px;color:var(--muted);line-height:1.5;font-style:italic}
.pcopy{position:absolute;top:50%;right:14px;transform:translateY(-50%);font-size:16px;opacity:.25}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2140;color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:800;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="hdr">
  <button class="back" id="bk" onclick="showG()">&#8592; Zurück</button>
  <h1 id="htl">DTZ Redemittel</h1>
  <p id="hsu">Mündliche Prüfung – Teil 3 · Gemeinsam planen</p>
</div>
<div class="gs on" id="gs">
  <div class="slbl">Thema wählen</div>
  <div class="grid" id="gg"></div>
</div>
<div class="ds" id="ds">
  <div class="dhdr">
    <div class="dem" id="dem"></div>
    <div><div class="dtl" id="dtl"></div><div class="dsu" id="dsu"></div></div>
  </div>
  <div class="plist" id="pl"></div>
</div>
<div class="toast" id="toast">Kopiert ✓</div>
<script>
var CL=["#3b6ff7","#e0534a","#27ae60","#8e44ad","#e67e22","#16a085","#c0392b","#2980b9","#d35400","#1abc9c"];
var KAT=[
{n:"Vorschlag machen",e:"💡",s:"Ideen und Vorschläge einbringen",p:[
["Wir könnten … (+ Infinitiv)","Wir könnten am Samstag in den Park gehen."],
["Was hältst du davon, wenn wir …?","Was hältst du davon, wenn wir zusammen kochen?"],
["Ich schlage vor, dass wir …","Ich schlage vor, dass wir um 15 Uhr anfangen."],
["Wie wäre es mit …?","Wie wäre es mit einem Picknick am See?"],
["Ich finde, wir sollten …","Ich finde, wir sollten früh genug planen."],
["Vielleicht könnten wir auch …","Vielleicht könnten wir auch die Kinder mitnehmen."],
["Mein Vorschlag wäre, …","Mein Vorschlag wäre, die Bahn zu nehmen."]]},
{n:"Vorschlag ablehnen",e:"🚫",s:"Höflich ablehnen und begründen",p:[
["Das finde ich nicht so gut, weil …","Das finde ich nicht so gut, weil es zu teuer ist."],
["Ich bin nicht sicher, ob das eine gute Idee ist.","Hmm, ich bin nicht sicher, ob das eine gute Idee ist."],
["Das klappt leider nicht, weil …","Das klappt leider nicht, weil ich arbeiten muss."],
["Das ist eine gute Idee, aber …","Das ist eine gute Idee, aber ich bevorzuge etwas anderes."],
["Hmm, vielleicht nicht, weil …","Hmm, vielleicht nicht – wir haben nicht genug Zeit."],
["Das würde ich lieber nicht, weil …","Das würde ich lieber nicht machen, weil es zu weit ist."]]},
{n:"Meinung sagen",e:"🗣️",s:"Die eigene Meinung ausdrücken",p:[
["Ich denke, dass …","Ich denke, dass das eine gute Idee ist."],
["Meiner Meinung nach …","Meiner Meinung nach sollten wir früh anfangen."],
["Ich glaube, …","Ich glaube, das wird Spaß machen."],
["Ich finde das sehr gut, weil …","Ich finde das sehr gut, weil wir Zeit sparen."],
["Das ist mir wichtig, weil …","Das ist mir wichtig, weil alle mitkommen sollen."],
["Ich bin der Meinung, dass …","Ich bin der Meinung, dass wir mehr planen sollten."]]},
{n:"Zustimmen",e:"✅",s:"Einem Vorschlag zustimmen",p:[
["Ja, das ist eine gute Idee!","Ja, das ist eine gute Idee – machen wir das so!"],
["Das finde ich auch gut.","Das finde ich auch gut. Ich bin einverstanden."],
["Einverstanden! / Abgemacht!","Einverstanden! Dann treffen wir uns um 10 Uhr."],
["Das stimmt. / Da hast du Recht.","Das stimmt – es wäre besser, früh zu fahren."],
["Das klingt gut!","Das klingt gut! Ich freue mich schon darauf."],
["Ja, das können wir machen.","Ja, das können wir machen. Kein Problem."]]},
{n:"Nachfragen",e:"❓",s:"Verstehen und Rückfragen stellen",p:[
["Wie meinst du das genau?","Wie meinst du das genau? Kannst du das erklären?"],
["Kannst du das noch einmal sagen?","Kannst du das bitte noch einmal sagen?"],
["Was meinst du mit …?","Was meinst du mit 'früh'? Um wie viel Uhr?"],
["Hast du schon eine Idee, wie / wo / wann …?","Hast du schon eine Idee, wo wir essen können?"],
["Entschuldigung, ich habe das nicht verstanden.","Entschuldigung, ich habe das nicht ganz verstanden."],
["Könntest du das bitte wiederholen?","Könntest du das bitte wiederholen?"]]},
{n:"Wort weitergeben",e:"🔄",s:"Den Gesprächspartner einbeziehen",p:[
["Was denkst du?","Was denkst du? Hast du eine bessere Idee?"],
["Und du? Was ist deine Meinung?","Und du? Was ist deine Meinung dazu?"],
["Wie siehst du das?","Wie siehst du das – sollen wir zusammen fahren?"],
["Hast du noch eine Idee?","Hast du noch eine Idee? Mir fällt nichts mehr ein."],
["Was würdest du vorschlagen?","Was würdest du vorschlagen? Ich bin nicht sicher."]]},
{n:"Kompromiss finden",e:"🤝",s:"Sich einigen und Lösungen suchen",p:[
["Okay, dann machen wir … und …","Okay, dann fahren wir mit dem Zug und essen später."],
["Wir könnten beides machen: … und …","Wir könnten beides machen: erst Park, dann essen."],
["Dann einigen wir uns auf …","Dann einigen wir uns auf Samstag um 14 Uhr."],
["Also gut, dann machen wir es so.","Also gut, dann machen wir es so. Einverstanden."],
["Das klingt nach einem guten Plan!","Das klingt nach einem guten Plan! Abgemacht."]]},
{n:"Begründen",e:"📋",s:"Warum erklären – Gründe nennen",p:[
["… weil …","Ich schlage das vor, weil es günstiger ist."],
["… denn …","Das ist eine gute Idee, denn wir haben mehr Zeit."],
["… deshalb / daher …","Der Zug ist teuer, deshalb nehmen wir das Auto."],
["Der Grund ist, dass …","Der Grund ist, dass alle gut mitkommen können."],
["Das hat den Vorteil, dass …","Das hat den Vorteil, dass wir zusammen sind."]]},
{n:"Strukturieren",e:"📝",s:"Punkte ordnen und aufzählen",p:[
["Erstens … Zweitens … Drittens …","Erstens brauchen wir Essen, zweitens Getränke."],
["Zuerst … Dann … Danach … Zum Schluss …","Zuerst planen wir das Datum, dann kaufen wir ein."],
["Außerdem …","Außerdem sollten wir an Musik denken."],
["Auch wichtig ist …","Auch wichtig ist, wer die Getränke mitbringt."],
["Vergessen wir nicht, …","Vergessen wir nicht, alle rechtzeitig einzuladen."]]},
{n:"Zeit gewinnen",e:"🤔",s:"Überbrücken – wenn man nachdenkt",p:[
["Hmm, das ist eine gute Frage.","Hmm, das ist eine gute Frage. Ich überlege kurz."],
["Moment, ich überlege kurz …","Moment, ich überlege kurz, was am besten passt."],
["Ich bin nicht sicher, aber …","Ich bin nicht sicher, aber vielleicht könnten wir …"],
["Wie sagt man … auf Deutsch?","Wie sagt man das auf Deutsch? Ich kenne das Wort nicht."],
["Ich meine … wie soll ich sagen …","Ich meine … wie soll ich sagen … es ist schwierig."],
["Das ist schwierig zu erklären, aber …","Das ist schwierig zu erklären, aber ich versuche es."]]}
];

function render(){
  var g=document.getElementById("gg");
  g.innerHTML=KAT.map(function(k,i){
    var c=CL[i%CL.length];
    return '<div class="cc" onclick="show('+i+')">'
      +'<span class="cem">'+k.e+'</span>'
      +'<div class="cnm">'+k.n+'</div>'
      +'<span class="cct" style="background:'+c+'">'+k.p.length+' Sätze</span>'
      +'</div>';
  }).join("");
}

function show(i){
  var k=KAT[i],c=CL[i%CL.length];
  document.getElementById("dem").textContent=k.e;
  document.getElementById("dtl").textContent=k.n;
  document.getElementById("dsu").textContent=k.s;
  document.getElementById("htl").textContent=k.n;
  document.getElementById("hsu").textContent=k.s;
  document.getElementById("bk").className="back on";
  document.getElementById("pl").innerHTML=k.p.map(function(p){
    var safe=p[0].replace(/"/g,"&quot;");
    return '<div class="pc" onclick="cp(this)" data-t="'+safe+'" style="border-left-color:'+c+'">'
      +'<div class="pt">'+p[0]+'</div>'
      +'<div class="pe">'+p[1]+'</div>'
      +'<span class="pcopy">📋</span>'
      +'</div>';
  }).join("");
  document.getElementById("gs").className="gs";
  document.getElementById("ds").className="ds on";
  window.scrollTo(0,0);
}

function showG(){
  document.getElementById("ds").className="ds";
  document.getElementById("gs").className="gs on";
  document.getElementById("bk").className="back";
  document.getElementById("htl").textContent="DTZ Redemittel";
  document.getElementById("hsu").textContent="Mündliche Prüfung – Teil 3 · Gemeinsam planen";
  window.scrollTo(0,0);
}

function cp(el){
  var t=el.getAttribute("data-t");
  if(navigator.clipboard)navigator.clipboard.writeText(t).catch(function(){});
  var to=document.getElementById("toast");
  to.className="toast on";
  setTimeout(function(){to.className="toast";},1800);
}

render();
</script>
</body>
</html>
